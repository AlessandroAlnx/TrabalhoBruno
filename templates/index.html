<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copa 26 de ENG | Pergunte a IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="bg-photo photo-left" aria-hidden="true"></div>
  <div class="bg-photo photo-right" aria-hidden="true"></div>
  <div class="bg-ball ball-a"></div>
  <div class="bg-ball ball-b"></div>

  <main class="app-shell">
    <header class="hero">
      <p class="badge">COPA 26 DE ENG</p>
      <h1>Pergunte tudo sobre futebol com IA</h1>
      <p class="subtitle">Selecoes, curiosidades, historia e palpites: seu portal de conversa para a Copa em 2026.</p>
    </header>

    <section class="chat-card">
      <form id="pergunta-form">
        <label for="pergunta">Sua pergunta</label>
        <textarea id="pergunta" name="pergunta" rows="4" placeholder="Ex: Quantos times jogam a Copa do Mundo?" required></textarea>
        <button id="btn-enviar" type="submit">Perguntar agora</button>
      </form>

      <section class="resposta-wrap">
        <h2>Resposta</h2>
        <div id="status" class="status">Pronto para perguntar.</div>
        <article id="resposta" class="resposta">A resposta da IA vai aparecer aqui.</article>
      </section>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
